<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<script>
const sizes = [192, 512, 180];
const names = ['icon-192.png', 'icon-512.png', 'apple-icon.png'];

sizes.forEach((size, i) => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#2563eb';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.17);
  ctx.fill();

  const centerX = size / 2;
  const topY = size * 0.2;
  const bottomY = size * 0.75;
  const width = size * 0.35;

  ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
  ctx.beginPath();
  ctx.moveTo(centerX, topY);
  ctx.lineTo(centerX - width, topY + width * 0.6);
  ctx.lineTo(centerX - width, bottomY);
  ctx.lineTo(centerX, bottomY + width * 0.4);
  ctx.lineTo(centerX + width, bottomY);
  ctx.lineTo(centerX + width, topY + width * 0.6);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = '#2563eb';
  ctx.lineWidth = size * 0.03;
  ctx.lineCap = 'round';

  [[0.48, 0.15], [0.58, 0.15], [0.66, 0.075]].forEach(([y, w]) => {
    ctx.beginPath();
    ctx.moveTo(centerX - size * w, size * y);
    ctx.lineTo(centerX + size * w, size * y);
    ctx.stroke();
  });

  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = names[i];
    a.textContent = `Download ${names[i]}`;
    document.body.appendChild(a);
  });
});
</script>
<p>Click the links above to download the icons, then place them in the /public folder.</p>
</body>
</html>
